<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-label="Docility &#8212; ambient music &amp; field recordings">
  <defs>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0" stop-color="#36e0c8"/>
      <stop offset="0.28" stop-color="#46c6ff"/>
      <stop offset="0.55" stop-color="#9a7bff"/>
      <stop offset="0.78" stop-color="#ff7a8f"/>
      <stop offset="1" stop-color="#ffd36e"/>
    </linearGradient>
    <radialGradient id="g-aqua"><stop offset="0" stop-color="#36e0c8" stop-opacity="0.9"/><stop offset="0.7" stop-color="#36e0c8" stop-opacity="0"/></radialGradient>
    <radialGradient id="g-violet"><stop offset="0" stop-color="#9a7bff" stop-opacity="0.9"/><stop offset="0.7" stop-color="#9a7bff" stop-opacity="0"/></radialGradient>
    <radialGradient id="g-coral"><stop offset="0" stop-color="#ff7a8f" stop-opacity="0.85"/><stop offset="0.7" stop-color="#ff7a8f" stop-opacity="0"/></radialGradient>
    <radialGradient id="g-sky"><stop offset="0" stop-color="#46c6ff" stop-opacity="0.8"/><stop offset="0.7" stop-color="#46c6ff" stop-opacity="0"/></radialGradient>
    <radialGradient id="g-gold"><stop offset="0" stop-color="#ffd36e" stop-opacity="0.7"/><stop offset="0.7" stop-color="#ffd36e" stop-opacity="0"/></radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="46"/></filter>
    <radialGradient id="vignette" cx="0.5" cy="0.35" r="0.85">
      <stop offset="0.45" stop-color="#070a14" stop-opacity="0"/>
      <stop offset="1" stop-color="#070a14" stop-opacity="0.92"/>
    </radialGradient>
  </defs>

  <!-- backdrop -->
  <rect width="1280" height="420" fill="#070a14"/>

  <!-- aurora blobs -->
  <g filter="url(#soft)">
    <circle cx="180" cy="120" r="200" fill="url(#g-aqua)"/>
    <circle cx="1080" cy="90" r="230" fill="url(#g-violet)"/>
    <circle cx="980" cy="360" r="200" fill="url(#g-coral)"/>
    <circle cx="430" cy="360" r="190" fill="url(#g-sky)"/>
    <circle cx="660" cy="170" r="170" fill="url(#g-gold)"/>
  </g>
  <rect width="1280" height="420" fill="url(#vignette)"/>

  <!-- rain streaks -->
  <g stroke="#9fd8ff" stroke-width="1.4" stroke-linecap="round" opacity="0.18">
    <line x1="150" y1="40" x2="146" y2="74"/>
    <line x1="320" y1="20" x2="316" y2="58"/>
    <line x1="520" y1="48" x2="516" y2="82"/>
    <line x1="760" y1="24" x2="756" y2="60"/>
    <line x1="980" y1="44" x2="976" y2="80"/>
    <line x1="1140" y1="30" x2="1136" y2="66"/>
    <line x1="240" y1="350" x2="236" y2="386"/>
    <line x1="600" y1="360" x2="596" y2="396"/>
    <line x1="1040" y1="346" x2="1036" y2="382"/>
  </g>

  <!-- equaliser bars -->
  <g fill="url(#ink)" opacity="0.92">
    <rect x="544" y="284" width="9" height="26" rx="4.5"/>
    <rect x="565" y="270" width="9" height="40" rx="4.5"/>
    <rect x="586" y="252" width="9" height="58" rx="4.5"/>
    <rect x="607" y="238" width="9" height="72" rx="4.5"/>
    <rect x="628" y="256" width="9" height="54" rx="4.5"/>
    <rect x="649" y="274" width="9" height="36" rx="4.5"/>
    <rect x="670" y="288" width="9" height="22" rx="4.5"/>
    <rect x="691" y="266" width="9" height="44" rx="4.5"/>
    <rect x="712" y="248" width="9" height="62" rx="4.5"/>
    <rect x="733" y="278" width="9" height="32" rx="4.5"/>
  </g>

  <!-- wordmark -->
  <text x="640" y="190" text-anchor="middle"
        font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-weight="600"
        font-size="128" letter-spacing="1" fill="url(#ink)">Docility</text>

  <!-- tagline -->
  <text x="640" y="234" text-anchor="middle"
        font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-weight="400"
        font-size="22" letter-spacing="7" fill="#aab3d4">AMBIENT MUSIC &#183; FIELD RECORDINGS</text>
</svg>
