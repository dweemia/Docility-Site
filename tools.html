<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#070a14" />
  <meta name="color-scheme" content="dark" />
  <title>Tools — Docility</title>
  <meta name="description" content="The gear behind Docility — field recorders, microphones, synths and the studio setup used to make the music." />

  <!-- Open Graph / social sharing -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://docility.work/tools.html" />
  <meta property="og:title" content="Tools — Docility" />
  <meta property="og:description" content="The gear behind Docility — field recorders, microphones, synths and the studio setup." />
  <meta property="og:image" content="https://docility.work/assets/og-cover.jpg" />

  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="preload" href="assets/fonts/VIC-Regular.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="assets/fonts/VIC-Medium.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Animated ambient backdrop -->
  <div class="aurora" aria-hidden="true">
    <span class="blob blob--aqua"></span>
    <span class="blob blob--violet"></span>
    <span class="blob blob--coral"></span>
    <span class="blob blob--gold"></span>
    <span class="blob blob--sky"></span>
  </div>
  <canvas id="rain" aria-hidden="true"></canvas>
  <div class="grain" aria-hidden="true"></div>

  <!-- Navigation -->
  <header class="nav" id="nav">
    <a class="nav__brand" href="index.html#top">
      <span class="nav__mark" aria-hidden="true"></span>
      Docility
    </a>
    <nav class="nav__links" aria-label="Primary">
      <a href="index.html#about">About</a>
      <a href="index.html#albums">Albums</a>
      <a href="tools.html" aria-current="page">Tools</a>
      <a href="index.html#listen">Listen</a>
    </nav>
  </header>

  <main id="top">
    <section class="tools" id="tools">
      <div class="section-head reveal">
        <span class="section-head__kicker">Behind the sound</span>
        <h2>Tools</h2>
        <p class="section-head__sub">
          All the gear I use in my music production.
        </p>
      </div>

      <!-- Feature: the DAW screenshot, framed as a window -->
      <figure class="gear-feature reveal">
        <div class="gear-feature__frame">
          <div class="gear-feature__bar" aria-hidden="true">
            <span></span><span></span><span></span>
          </div>
          <img class="gear-feature__shot" src="assets/tools/ableton.jpeg"
               alt="Ableton Live 12 — the session where tracks are arranged" loading="lazy" />
          <span class="gear-feature__fallback" aria-hidden="true">Ableton Live 12</span>
        </div>
        <figcaption class="gear-feature__cap">
          <span class="gear__cat">Digital audio workstation</span>
          <h3 class="gear__name">Ableton Live 12</h3>
        </figcaption>
      </figure>

      <!-- Cut-out hardware -->
      <div class="gear-grid">
        <figure class="gear gear--diag reveal" style="--accent: var(--aqua)">
          <div class="gear__media">
            <img class="gear__art" src="assets/tools/rode.png"
                 alt="RØDE NTG2 shotgun microphone" loading="lazy" />
            <span class="gear__fallback" aria-hidden="true">RØDE NTG2</span>
          </div>
          <figcaption>
            <span class="gear__cat">Shotgun microphone</span>
            <h3 class="gear__name">RØDE NTG2</h3>
            <p class="gear__note">
              A great piece of kit for isolating sounds and recording vocal samples.
            </p>
          </figcaption>
        </figure>

        <figure class="gear gear--tall reveal" style="--delay:.08s; --accent: var(--sky)">
          <div class="gear__media">
            <img class="gear__art" src="assets/tools/zoom.png"
                 alt="Zoom H5studio handheld recorder" loading="lazy" />
            <span class="gear__fallback" aria-hidden="true">Zoom H5studio</span>
          </div>
          <figcaption>
            <span class="gear__cat">Field recorder</span>
            <h3 class="gear__name">Zoom H5studio</h3>
            <p class="gear__note">
              My second Zoom recorder, following on from the trust H4n Pro.
            </p>
          </figcaption>
        </figure>

        <figure class="gear gear--wide reveal" style="--delay:.16s; --accent: var(--green)">
          <div class="gear__media">
            <img class="gear__art" src="assets/tools/launchkey.webp"
                 alt="Novation Launchkey Mk4 61-key MIDI keyboard" loading="lazy" />
            <span class="gear__fallback" aria-hidden="true">Launchkey Mk4 61</span>
          </div>
          <figcaption>
            <span class="gear__cat">MIDI keyboard</span>
            <h3 class="gear__name">Novation Launchkey Mk4 61</h3>
            <p class="gear__note">
              A powerhouse MIDI keyboard.
            </p>
          </figcaption>
        </figure>

        <figure class="gear gear--wide reveal" style="--delay:.24s; --accent: var(--coral)">
          <div class="gear__media">
            <img class="gear__art" src="assets/tools/minifreak.png"
                 alt="Arturia MiniFreak synthesizer" loading="lazy" />
            <span class="gear__fallback" aria-hidden="true">Arturia MiniFreak</span>
          </div>
          <figcaption>
            <span class="gear__cat">Synthesizer</span>
            <h3 class="gear__name">Arturia MiniFreak</h3>
            <p class="gear__note">
              My new toy for exploring the power of synthesisers.
            </p>
          </figcaption>
        </figure>

        <figure class="gear gear--diag reveal" style="--delay:.32s; --accent: var(--gold)">
          <div class="gear__media">
            <img class="gear__art" src="assets/tools/clippys.png"
                 alt="Pair of clip-on lavalier microphones" loading="lazy" />
            <span class="gear__fallback" aria-hidden="true">Clip-on mics</span>
          </div>
          <figcaption>
            <span class="gear__cat">Clip-on microphones</span>
            <h3 class="gear__name">Clip-on mics</h3>
            <p class="gear__note">
              A pair of clip-on lavalier mics for discreet, up-close field recording.
            </p>
          </figcaption>
        </figure>
      </div>
    </section>
  </main>

  <footer class="footer">
    <span>Docility</span>
    <span>Ambient music &amp; field recordings</span>
    <span>© <span id="year"></span></span>
  </footer>

  <script src="main.js" defer></script>
</body>
</html>
